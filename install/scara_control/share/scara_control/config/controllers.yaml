controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Основной контроллер руки
    scara_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Новый контроллер схвата
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# Настройки руки
scara_controller:
  ros__parameters:
    joints:
      - hand1_joint
      - hand2_joint
      - hand3_joint
      
    command_interfaces:
      - position
      
    state_interfaces:
      - position
      - velocity
    constraints:
      goal_time: 0.0          # 0 = отключить проверку времени
      stopped_velocity_tolerance: 0.0
      hand1_joint:
        trajectory: 0.0       # 0 = отключить проверку точности траектории
        goal: 0.0             # 0 = отключить проверку точности финиша
      hand2_joint:
        trajectory: 0.0
        goal: 0.0
      hand3_joint:
        trajectory: 0.0
        goal: 0.0
    # PID для руки
    gains:
      hand1_joint: {p: 10000.0, i: 0.0, d: 500.0}
      hand2_joint: {p: 10000.0, i: 0.0, d: 500.0}
      hand3_joint: {p: 5000.0, i: 0.0, d: 100.0}

# Настройки схвата
gripper_controller:
  ros__parameters:
    constraints:
      goal_time: 0.0          # 0 = отключить проверку времени
      stopped_velocity_tolerance: 0.0
      hand1_joint:
        trajectory: 0.0       # 0 = отключить проверку точности траектории
        goal: 0.0             # 0 = отключить проверку точности финиша
      hand2_joint:
        trajectory: 0.0
        goal: 0.0
      hand3_joint:
        trajectory: 0.0
        goal: 0.0
    joints:
      - finger2_joint
      - finger3_joint
      - finger4_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      finger2_joint: {p: 100.0, i: 0.0, d: 1.0}
      finger3_joint: {p: 100.0, i: 0.0, d: 1.0}
      finger4_joint: {p: 100.0, i: 0.0, d: 1.0}
