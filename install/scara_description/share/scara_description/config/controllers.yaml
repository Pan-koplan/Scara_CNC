controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    scara_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/JointGroupPositionController

# ----------------------------------------------------------------
# JOINT STATE BROADCASTER
# ----------------------------------------------------------------
joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster

# ----------------------------------------------------------------
# ARM CONTROLLER (SCARA)
# ----------------------------------------------------------------
scara_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    joints:
      - hand1_joint
      - hand2_joint
      - hand3_joint
      
    command_interfaces:
      - position
    
    state_interfaces:
      - position
      - velocity
      
    # PID gains are often required for Gazebo when using JTC
    gains:
      hand1_joint: {p: 10000.0, i: 0.0, d: 500.0}
      hand2_joint: {p: 10000.0, i: 0.0, d: 500.0}
      hand3_joint: {p: 5000.0, i: 0.0, d: 100.0}

# ----------------------------------------------------------------
# GRIPPER CONTROLLER
# ----------------------------------------------------------------
gripper_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints:
      - finger2_joint
      - finger3_joint
      - finger4_joint
    gains:
      finger_joint1: {p: 1000.0, i: 0.0, d: 10.0} #
      finger_joint2: {p: 1000.0, i: 0.0, d: 10.0} #
      finger_joint3: {p: 1000.0, i: 0.0, d: 10.0} #
      
    # JointGroupPositionController uses this simple parameter
    interface_name: position
