services:
  robot_hw:
    profiles: ["hw"]
    build:
      context: .
      dockerfile: Dockerfile
      target: hw
    container_name: scara_robot_hw
    network_mode: host
    privileged: true
    environment:
      SERIAL_PORT: /dev/ttyUSB0
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    restart: unless-stopped

  robot_sim:
    profiles: ["sim"]
    build:
      context: .
      dockerfile: Dockerfile
      target: sim
    container_name: scara_robot_sim
    network_mode: host
    privileged: true
    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    restart: unless-stopped
